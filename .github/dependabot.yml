version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/src/catalog"
    schedule:
      interval: "weekly"
  - package-ecosystem: "maven"
    directory: "/src/cart"
    schedule:
      interval: "weekly"
  - package-ecosystem: "maven"
    directory: "/src/orders"
    schedule:
      interval: "weekly"
  - package-ecosystem: "maven"
    directory: "/src/ui"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/src/checkout"
    schedule:
      interval: "weekly"
