name: Build and Deploy Retail Store Services

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      changed-services: ${{ steps.changes.outputs.changed-services }}
      matrix: ${{ steps.changes.outputs.matrix }}
      has-changes: ${{ steps.changes.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changes
        shell: bash
        run: |
          SERVICES=("ui" "catalog" "cart" "checkout" "orders")
          CHANGED_SERVICES=()

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED_SERVICES=("${SERVICES[@]}")
          else
            for service in "${SERVICES[@]}"; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^src/${service}/"; then
                CHANGED_SERVICES+=("$service")
              fi
            done
          fi

          if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
            echo "matrix={"service":[]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MATRIX_JSON="["
          for i in "${!CHANGED_SERVICES[@]}"; do
            [ "$i" -gt 0 ] && MATRIX_JSON+=","
            MATRIX_JSON+=""${CHANGED_SERVICES[$i]}""
          done
          MATRIX_JSON+="]"

          echo "changed-services=${CHANGED_SERVICES[*]}" >> "$GITHUB_OUTPUT"
          echo "matrix={"service":$MATRIX_JSON}" >> "$GITHUB_OUTPUT"
          echo "has-changes=true" >> "$GITHUB_OUTPUT"

  deploy:
    name: Build, Scan, Push, and Update Helm - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account ID
        id: aws
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.sha }}
          AWS_ACCOUNT_ID: ${{ steps.aws.outputs.account_id }}
        run: |
          SHORT_TAG="${TAG:0:7}"
          ECR_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/retail-store-${SERVICE}"

          aws ecr describe-repositories --repository-names "retail-store-${SERVICE}" >/dev/null 2>&1 ||             aws ecr create-repository               --repository-name "retail-store-${SERVICE}"               --image-scanning-configuration scanOnPush=true               --encryption-configuration encryptionType=AES256

          docker build             --label org.opencontainers.image.source="${{ github.server_url }}/${{ github.repository }}"             --label org.opencontainers.image.revision="${{ github.sha }}"             -t "${ECR_REPO}:${SHORT_TAG}"             -t "${ECR_REPO}:latest"             "src/${SERVICE}/"

          echo "ECR_REPO=${ECR_REPO}" >> "$GITHUB_ENV"
          echo "SHORT_TAG=${SHORT_TAG}" >> "$GITHUB_ENV"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.ECR_REPO }}:${{ env.SHORT_TAG }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

      - name: Generate image SBOM
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.ECR_REPO }}:${{ env.SHORT_TAG }}
          format: cyclonedx
          output: sbom-${{ matrix.service }}.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: sbom-${{ matrix.service }}.json

      - name: Push image to ECR
        run: |
          docker push "${ECR_REPO}:${SHORT_TAG}"
          docker push "${ECR_REPO}:latest"

      - name: Update Helm values
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          VALUES_FILE="src/${SERVICE}/chart/values.yaml"
          test -f "$VALUES_FILE"
          cp "$VALUES_FILE" "$VALUES_FILE.backup"

          awk -v repo="${ECR_REPO}" -v tag="${SHORT_TAG}" '
            BEGIN { in_main_image = 0; updated_repo = 0; updated_tag = 0 }
            /^image:/ { in_main_image = 1; print; next }
            in_main_image && /^[[:space:]]*repository:/ && !updated_repo { print "  repository: " repo; updated_repo = 1; next }
            in_main_image && /^[[:space:]]*tag:/ && !updated_tag { print "  tag: "" tag """; updated_tag = 1; next }
            /^[a-zA-Z]/ && !/^image:/ { in_main_image = 0 }
            { print }
          ' "$VALUES_FILE.backup" > "$VALUES_FILE"

          grep -q "${ECR_REPO}" "$VALUES_FILE"
          grep -q ""${SHORT_TAG}"" "$VALUES_FILE"
          rm "$VALUES_FILE.backup"

      - name: Commit Helm value update
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          git config --local user.email "gitops-bot@users.noreply.github.com"
          git config --local user.name "GitOps Bot"
          if ! git diff --quiet "src/${SERVICE}/chart/values.yaml"; then
            git add "src/${SERVICE}/chart/values.yaml"
            git commit -m "chore(gitops): update ${SERVICE} image to ${SHORT_TAG}"
            git pull --rebase origin main
            git push origin main
          else
            echo "No Helm image change detected."
          fi

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, deploy]
    if: always()
    steps:
      - name: Create deployment summary
        run: |
          echo "## Retail Store GitOps Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Changed services: ${{ needs.detect-changes.outputs.changed-services }}" >> "$GITHUB_STEP_SUMMARY"
          echo "ArgoCD will reconcile Helm chart changes from the main branch." >> "$GITHUB_STEP_SUMMARY"
